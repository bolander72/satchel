name: OrangeBubbles
options:
  bundleIdPrefix: com.bolandcompany
  deploymentTarget:
    iOS: "17.5"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1
    # Set your Apple Developer team here (or in Xcode) to run on device.
    DEVELOPMENT_TEAM: B28G4GL96T
  configs:
    debug:
      # Debug builds run on signet (Mutinynet) — free test coins.
      WALLET_NETWORK: signet
    release:
      WALLET_NETWORK: bitcoin

packages:
  WalletKit:
    path: WalletKit

targets:
  OrangeBubbles:
    type: application
    platform: iOS
    sources:
      - HostApp
      - Shared
      - PasskeyShared
    dependencies:
      - target: MessagesExtension
      - target: WalletWidget
      - package: WalletKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bolandcompany.orangebubbles
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
    info:
      path: HostApp/Info.plist
      properties:
        CFBundleDisplayName: OrangeBubbles
        CFBundleURLTypes:
          - CFBundleURLName: com.bolandcompany.orangebubbles
            CFBundleURLSchemes:
              - orangebubbles
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        # iOS resolves an extension's privacy prompts through the
        # CONTAINING app — these must mirror the extension's strings or
        # camera/Face ID requests silently fail inside Messages.
        NSCameraUsageDescription: >-
          The camera is used to scan Bitcoin QR codes when sending a payment.
        NSFaceIDUsageDescription: >-
          Face ID protects your Bitcoin wallet: it's required to send
          bitcoin and reveal your recovery phrase.
    entitlements:
      path: HostApp/OrangeBubbles.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.bolandcompany.orangebubbles
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.bolandcompany.orangebubbles
        com.apple.developer.icloud-services:
          - CloudDocuments
        com.apple.developer.associated-domains:
          - webcredentials:www.boland.co
          # developer-mode entry: lets dev builds bypass Apple's AASA CDN
          # cache (requires Settings > Developer > Associated Domains
          # Development on the phone); ignored by App Store builds.
          - webcredentials:www.boland.co?mode=developer
        com.apple.security.application-groups:
          - group.com.bolandcompany.orangebubbles
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.bolandcompany.orangebubbles.shared

  MessagesExtension:
    type: app-extension.messages
    platform: iOS
    sources:
      - MessagesExtension
      - Shared
      - PasskeyShared
    dependencies:
      - package: WalletKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bolandcompany.orangebubbles.MessagesExtension
        PRODUCT_NAME: OrangeBubbles
        # Distinct module name: the host app target is also named OrangeBubbles.
        PRODUCT_MODULE_NAME: OrangeBubblesMessages
        ASSETCATALOG_COMPILER_APPICON_NAME: iMessage App Icon
    info:
      path: MessagesExtension/Info.plist
      properties:
        CFBundleDisplayName: OrangeBubbles
        WalletNetwork: $(WALLET_NETWORK)
        NSFaceIDUsageDescription: >-
          Face ID protects your Bitcoin wallet: it's required to create,
          unlock, and send from your wallet.
        NSCameraUsageDescription: >-
          The camera is used to scan Bitcoin QR codes when sending a payment.
        NSExtension:
          NSExtensionPointIdentifier: com.apple.message-payload-provider
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).MessagesViewController
    entitlements:
      path: MessagesExtension/MessagesExtension.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.bolandcompany.orangebubbles
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.bolandcompany.orangebubbles
        com.apple.developer.icloud-services:
          - CloudDocuments
        com.apple.developer.associated-domains:
          - webcredentials:www.boland.co
          # developer-mode entry: lets dev builds bypass Apple's AASA CDN
          # cache (requires Settings > Developer > Associated Domains
          # Development on the phone); ignored by App Store builds.
          - webcredentials:www.boland.co?mode=developer
        com.apple.security.application-groups:
          - group.com.bolandcompany.orangebubbles
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.bolandcompany.orangebubbles.shared

  WalletWidget:
    type: app-extension
    platform: iOS
    sources:
      - WalletWidget
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bolandcompany.orangebubbles.WalletWidget
    info:
      path: WalletWidget/Info.plist
      properties:
        CFBundleDisplayName: OrangeBubbles
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: WalletWidget/WalletWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.bolandcompany.orangebubbles
