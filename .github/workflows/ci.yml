name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    name: Server (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  walletkit:
    name: WalletKit (Swift package)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app || sudo xcode-select -s /Applications/Xcode.app
      - name: Test
        working-directory: app/WalletKit
        run: swift test

  ios-app:
    name: iOS app (simulator build)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app || sudo xcode-select -s /Applications/Xcode.app
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate project
        working-directory: app
        run: xcodegen generate
      - name: Build
        working-directory: app
        run: |
          xcodebuild -project OrangeBubbles.xcodeproj \
            -scheme OrangeBubbles \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
